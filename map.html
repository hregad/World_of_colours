<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette Preview Map — World of Colours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --ink: #18181A; --ink-mid: #52525A; --ink-light: #9090A0;
  --paper: #F6F4EF; --rule: #D8D4CC; --rule-dark: #B0AAA0;
  --font-d: 'DM Serif Display', Georgia, serif;
  --font-m: 'DM Mono', monospace;
  --font-s: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: var(--font-s); font-weight: 300; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* Header */
.mheader {
  height: 52px; flex-shrink: 0;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
  background: rgba(246,244,239,.97);
  backdrop-filter: blur(6px);
}
.mheader-back {
  font-family: var(--font-m); font-size: 10px;
  letter-spacing: .06em; color: var(--ink-light);
  text-decoration: none; transition: color .15s;
  display: flex; align-items: center; gap: 6px;
}
.mheader-back:hover { color: var(--ink); }
.mheader-title {
  font-family: var(--font-d); font-size: 17px;
  font-style: italic; color: var(--ink);
}
.mheader-sub {
  font-family: var(--font-m); font-size: 10px;
  color: var(--ink-light); letter-spacing: .04em;
}

/* Layout */
.map-layout {
  flex: 1; display: flex; overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px; flex-shrink: 0;
  border-right: 1px solid var(--rule);
  background: var(--paper);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sb-section {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--rule);
}
.sb-label {
  font-family: var(--font-m); font-size: 9px;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 8px;
}
.palette-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--rule) transparent;
}
.palette-list::-webkit-scrollbar { width: 4px; }
.palette-list::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

.pl-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,.04);
  transition: background .12s;
}
.pl-item:hover { background: rgba(0,0,0,.04); }
.pl-item.active { background: var(--ink); }
.pl-item.active .pl-name { color: var(--paper); }
.pl-item.active .pl-theme { color: rgba(246,244,239,.5); }

.pl-preview {
  display: flex; height: 20px; width: 56px; border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.pl-preview span { flex: 1; }
.pl-name {
  font-family: var(--font-d); font-size: 13px;
  color: var(--ink); letter-spacing: -.01em;
  line-height: 1.2;
}
.pl-theme {
  font-family: var(--font-m); font-size: 8px;
  color: var(--ink-light); letter-spacing: .04em;
  text-transform: uppercase;
}

/* Data selector */
select, .ctrl-btn {
  font-family: var(--font-m); font-size: 10px;
  letter-spacing: .03em;
  border: 1px solid var(--rule-dark); border-radius: 2px;
  background: transparent; color: var(--ink);
  padding: 5px 8px; cursor: pointer;
  transition: all .12s; width: 100%;
}
select:hover, .ctrl-btn:hover {
  border-color: var(--ink-mid); background: rgba(0,0,0,.03);
}
.ctrl-btn { width: auto; margin-top: 6px; display: inline-flex; align-items: center; gap: 6px; }
.ctrl-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Map container */
#map {
  flex: 1; position: relative;
}

/* Leaflet overrides — clean paper look */
.leaflet-container { background: #D4D0C8; font-family: var(--font-s); }
.leaflet-control-zoom a {
  font-family: var(--font-m) !important;
  color: var(--ink) !important;
  background: var(--paper) !important;
  border-color: var(--rule-dark) !important;
}
.leaflet-control-zoom a:hover { background: var(--paper-warm, #EDEAE2) !important; }

/* Legend */
.map-legend {
  position: absolute; bottom: 20px; right: 16px; z-index: 999;
  background: rgba(246,244,239,.95);
  border: 1px solid var(--rule);
  padding: 12px 14px;
  min-width: 140px;
  backdrop-filter: blur(4px);
}
.legend-title {
  font-family: var(--font-m); font-size: 9px;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 8px;
}
.legend-items { display: flex; flex-direction: column; gap: 4px; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-chip {
  width: 16px; height: 10px; border-radius: 1px; flex-shrink: 0;
  border: 1px solid rgba(0,0,0,.1);
}
.legend-lbl { font-family: var(--font-m); font-size: 9px; color: var(--ink-mid); }

/* Tooltip */
.leaflet-tooltip {
  background: var(--paper) !important;
  border: 1px solid var(--rule-dark) !important;
  border-radius: 2px !important;
  font-family: var(--font-m) !important;
  font-size: 10px !important;
  color: var(--ink) !important;
  padding: 4px 8px !important;
  box-shadow: none !important;
}

/* Filter chips */
.use-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.use-chip {
  font-family: var(--font-m); font-size: 9px;
  letter-spacing: .04em; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--rule-dark);
  border-radius: 2px; background: transparent;
  color: var(--ink-light); cursor: pointer; transition: all .12s;
}
.use-chip:hover { color: var(--ink); border-color: var(--ink-mid); }
.use-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* Responsive */
@media (max-width: 640px) {
  .sidebar { width: 220px; }
}
</style>
</head>
<body>

<div class="mheader">
  <a class="mheader-back" href="index.html">← Atlas</a>
  <div>
    <div class="mheader-title">Palette Preview Map</div>
    <div class="mheader-sub">Test any palette on real GIS data</div>
  </div>
</div>

// ─────────────────────────────────────────────────────────────
// COLOUR UTILS
// ─────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}

function getColorForValue(value, breaks, colors) {
  if (value === undefined || value === null) return '#cccccc';
  // Clamp and find bucket
  for (let i = 0; i < breaks.length; i++) {
    if (value <= breaks[i]) return colors[Math.min(i, colors.length-1)];
  }
  return colors[colors.length-1];
}

let geoLayer = null;
let geojsonData = null;

// ─────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────

}).addTo(map);

// ─────────────────────────────────────────────────────────────
// LOAD GEOJSON (Natural Earth countries via unpkg)
// ─────────────────────────────────────────────────────────────
async function loadGeoJSON() {
  const url = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';
  const topoUrl = url;

  // Use a simpler GeoJSON source
  const resp = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
  if (!resp.ok) throw new Error('GeoJSON fetch failed');
  return resp.json();
}

function applyPalette() {
  if (!geojsonData) return;
  const ds = DATASETS[currentDataset];
  const colors = currentPalette.colors;

  // Random: assign random class to each country
  if (currentDataset === 'random') {
    const keys = geojsonData.features.map(f => f.properties.ISO_A3 || f.properties.iso_a3 || '');
    keys.forEach(k => { if (k) ds.values[k] = Math.random() * 7; });
  }

  if (geoLayer) map.removeLayer(geoLayer);

  geoLayer = L.geoJSON(geojsonData, {
    style: feature => {
      const iso = feature.properties.ISO_A3 || feature.properties.iso_a3 || '';
      const val = ds.values[iso];
      const color = getColorForValue(val, ds.breaks, colors);
      return {
        fillColor: color,
        weight: 0.5,
        opacity: 0.6,
        color: '#888',
        fillOpacity: 0.85
      };
    },
    onEachFeature: (feature, layer) => {
      const iso = feature.properties.ISO_A3 || feature.properties.iso_a3 || '';
      const name = feature.properties.ADMIN || feature.properties.name || iso;
      const val = DATASETS[currentDataset].values[iso];
      const valStr = val !== undefined
        ? currentDataset === 'random'
          ? `Class ${Math.ceil(val)}`
          : currentDataset === 'pop'
            ? `${val.toLocaleString()}M`
            : currentDataset === 'area'
              ? `${val.toLocaleString()} km²`
              : `$${val.toLocaleString()}`
        : 'No data';

      layer.bindTooltip(`<strong>${name}</strong><br>${ds.label}: ${valStr}`, {
        sticky: true, opacity: 1
      });

      layer.on({ mouseover: e => e.target.setStyle({ weight: 1.5, color: '#333', fillOpacity: 0.95 }),
                 mouseout: e => geoLayer.resetStyle(e.target) });
    }
  }).addTo(map);

  updateLegend();
}

function updateLegend() {
  const ds = DATASETS[currentDataset];
  const colors = currentPalette.colors;
  const items = document.getElementById('legendItems');
  const title = document.getElementById('legendTitle');

  title.textContent = currentPalette.name;
  items.innerHTML = '';

  ds.breaks.forEach((b, i) => {
    const prev = ds.breaks[i-1];
    const color = colors[Math.min(i, colors.length-1)];
    let lbl;
    if (currentDataset === 'random') { lbl = `Class ${i+1}`; }
    else if (currentDataset === 'pop')  { lbl = `< ${b}M`; }
    else if (currentDataset === 'area') { lbl = `< ${(b/1000).toFixed(0)}k km²`; }
    else { lbl = `< $${b >= 1000 ? (b/1000)+'k' : b}`; }

    items.innerHTML += `
      <div class="legend-item">
        <div class="legend-chip" style="background:${color}"></div>
        <span class="legend-lbl">${lbl}</span>
      </div>`;
  });

  // No data
  items.innerHTML += `<div class="legend-item"><div class="legend-chip" style="background:#ccc;opacity:.5"></div><span class="legend-lbl">No data</span></div>`;
}

// ─────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────
function buildSidebar() {
  // Use-type chips
  const chipsEl = document.getElementById('useChips');
  const uses = ['all','sequential','diverging','qualitative','categorical'];
  uses.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'use-chip' + (u === 'all' ? ' active' : '');
    btn.textContent = u === 'all' ? 'All' : u;
    btn.addEventListener('click', () => {
      activeUse = u;
      document.querySelectorAll('.use-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildPaletteList();
    });
    chipsEl.appendChild(btn);
  });

  buildPaletteList();
}

function buildPaletteList() {
  const list = document.getElementById('paletteList');
  list.innerHTML = '';
  const filtered = activeUse === 'all' ? WOC_DATA : WOC_DATA.filter(p => p.use === activeUse);

  filtered.forEach(p => {
    const item = document.createElement('div');
    item.className = 'pl-item' + (p.id === currentPalette.id ? ' active' : '');

    const preview = document.createElement('div');
    preview.className = 'pl-preview';
    p.colors.slice(0,8).forEach(c => {
      const s = document.createElement('span');
      s.style.background = c;
      preview.appendChild(s);
    });

    item.innerHTML += '';
    item.appendChild(preview);
    const text = document.createElement('div');
    text.innerHTML = `<div class="pl-name">${p.name}</div><div class="pl-theme">${p.theme}</div>`;
    item.appendChild(text);

    item.addEventListener('click', () => {
      currentPalette = p;
      document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      applyPalette();
    });

    list.appendChild(item);
  });
}

// Dataset selector
document.getElementById('dataSelect').addEventListener('change', e => {
  currentDataset = e.target.value;
  applyPalette();
});

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
buildSidebar();

loadGeoJSON().then(data => {
  geojsonData = data;
  applyPalette();
}).catch(err => {
  console.error('GeoJSON load error:', err);
  document.getElementById('map').innerHTML +=
    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-family:var(--font-m);font-size:11px;color:#888;padding:40px;">' +
    'Could not load world data.<br>Check your connection and reload.' +
    '</div>';
});
</script>
</body>
</html>
